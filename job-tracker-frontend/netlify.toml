[build]
command = "npm run build"
publish = "dist"

[[redirects]]
from = "/api/auth/register"
to = "https://job-tracker-backend-gft1.onrender.com/auth/register"
status = 200
force = true

[[redirects]]
from = "/api/auth/login"
to = "https://job-tracker-backend-gft1.onrender.com/auth/login"
status = 200
force = true

[[redirects]]
from = "/api/*"
to = "https://job-tracker-backend-gft1.onrender.com/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200